name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  smoke:
    name: e2e smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/modsec-exporter ./cmd/modsec-exporter
      - name: Generate synthetic fixtures
        run: |
          mkdir -p test/fixtures
          go run ./cmd/loggen --count 5000 \
              --access-out test/fixtures/access.log \
              --error-out  test/fixtures/error.log
      - name: Run e2e smoke
        run: go test -tags=e2e -v ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.1
          args: --timeout=5m

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [test, smoke, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build binaries
        run: |
          mkdir -p dist
          for GOARCH in amd64 arm64; do
            GOOS=linux GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w -extldflags=-static -X main.version=${GITHUB_REF_NAME}" \
              -o dist/modsec-exporter-linux-$GOARCH \
              ./cmd/modsec-exporter
            GOOS=linux GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w -extldflags=-static" \
              -o dist/loggen-linux-$GOARCH \
              ./cmd/loggen
          done
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" &>/dev/null; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              dist/*
          fi
