name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  smoke:
    name: e2e smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/modsec-exporter ./cmd/modsec-exporter
      - name: Generate synthetic fixtures
        run: |
          mkdir -p test/fixtures
          go run ./cmd/loggen --count 5000 \
              --access-out test/fixtures/access.log \
              --error-out  test/fixtures/error.log
      - name: Run e2e smoke
        run: go test -tags=e2e -v ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m
